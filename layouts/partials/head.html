<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.site_description }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}{{ end }}">

{{ if .IsHome }}
  {{ with .Site.Params.author }}<meta name="author" content="{{ . }}">{{ end }}
{{ end }}

<link rel="canonical" href="{{ .Permalink }}">
{{ with .OutputFormats.Get "rss" }}<link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink }}" title="{{ $.Site.Title }}">{{ end }}

<link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">
<link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">

<!-- micro.blog head (feeds, IndieWeb, plugins) -->
{{ partial "microblog_head.html" . }}

<link rel="stylesheet" href="{{ "assets/current.css" | relURL }}">

<!-- Apply theme before paint to prevent flash -->
<script>
(function(){
  var p = localStorage.getItem('current-palette') || 'paper';
  var m = localStorage.getItem('current-mode') || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-palette', p);
  document.documentElement.setAttribute('data-mode', p === 'midnight' ? 'dark' : m);
  var s = localStorage.getItem('current-size');
  if (s && s !== 'default') document.documentElement.setAttribute('data-size', s);
})();
</script>

<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ if .IsPage }}{{ .Summary | plainify | truncate 160 }}{{ else }}{{ with .Site.Params.site_description }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
{{ with .Site.Params.avatar }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}
